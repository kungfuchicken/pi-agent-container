name: pi-agent

x-pi-common: &pi-common
  image: pi-coding-agent:active
  working_dir: /workspace
  stdin_open: true
  tty: true
  init: true
  environment:
    PI_CODING_AGENT_DIR: /home/node/.pi/agent
    # Set these in your shell or a local .env file (docker compose reads .env automatically)
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  entrypoint: ["/bin/bash", "-lc"]
  # PI_ARGS lets you pass extra CLI flags, e.g.:
  # PI_ARGS="--model sonnet:high"
  # Plans/reports mount at /working (pre-created in Dockerfile).
  # Can't nest inside /workspace because the bind mount is read-only at init.
  # Auto-discover extensions: find all index.ts files and build -e flags
  command:
    - "-lc"
    - "EXT_FLAGS=$$(find /extensions -name index.ts -maxdepth 2 2>/dev/null | sort | sed 's/^/-e /' | tr '\\n' ' '); pi $$EXT_FLAGS ${PI_ARGS:-}"

services:
  pi-full-dev:
    <<: *pi-common
    profiles: ["full-dev"]
    volumes:
      - ${WORKSPACE_DIR:-./}:/workspace
      - pi-agent-data:/home/node/.pi/agent
      - ${HOST_HOME}/.pi/agent/auth.json:/home/node/.pi/agent/auth.json:ro
      - ${WORKING_DIR}/plans:/working/plans
      - ${WORKING_DIR}/reports:/working/reports
      - ${HOST_PAC_DIR:-.}/extensions:/extensions:ro
    security_opt:
      - no-new-privileges:true

  pi-safe:
    <<: *pi-common
    profiles: ["safe"]
    # Read-only mode for safer exploration/review sessions
    command:
    - "-lc"
    - "EXT_FLAGS=$(find /extensions -name index.ts -maxdepth 2 2>/dev/null | sort | sed 's/^/-e /' | tr '\\n' ' '); pi $EXT_FLAGS --tools read,grep,find,ls ${PI_ARGS:-}"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 4g
    tmpfs:
      - /tmp:size=256m,mode=1777
    volumes:
      - ${WORKSPACE_DIR:-./}:/workspace:ro
      - pi-agent-data:/home/node/.pi/agent
      - ${HOST_HOME}/.pi/agent/auth.json:/home/node/.pi/agent/auth.json:ro
      - ${WORKING_DIR}/plans:/working/plans:ro
      - ${WORKING_DIR}/reports:/working/reports:ro
      - ${HOST_PAC_DIR:-.}/extensions:/extensions:ro

volumes:
  pi-agent-data:
